# MetaSystem default profile.
# This is the framework's own default shape, expressed as data so it can evolve
# without editing source constants (see ADR-0005). A profile declares:
#   - dirs: directories created by `init` (replaces the old PRIMARY_DIRS constant)
#   - templates: template entries to write (path + templateId; content is still
#     generated by TS functions in templates.ts because of project/core interpolation)
#   - mode: default project mode
#   - modules: governance modules this profile enables (can be trimmed/extended
#     by derived profiles or by user config)
#
# Versioning: bump `version` when this profile's structure changes. Record the
# rationale in .framework/decisions/ as an ADR.

version: 3
mode: learning
modules:
  - references
  - analyses
  - iterations
  - knowledge
  - events
  - adr

# Directories created on `init`, split into shared (all modes), learning-only
# (external references), and absorption-only (project-level source materials).
# `init` reads shared + the dirs for the selected mode.
dirs:
  # core runtime (shared)
  - .framework/events
  - .framework/backups
  - .framework/migrations
  # analysis layer (shared)
  - analyses/references
  - analyses/gaps
  - analyses/patterns
  - analyses/templates
  # project implementation (shared)
  - systems
  - systems/archive
  # governance (shared)
  - iterations/templates
  - knowledge/guides
  - knowledge/decisions
  - knowledge/patterns
  - knowledge/troubleshooting
  # data and releases (shared)
  - data
  - releases

# Learning-mode-only directories: external references are first-class.
dirs_learning:
  - references/intake
  - references/frozen

# Absorption-mode-only directories: the project's own source materials.
dirs_absorption:
  - problem

# Template files written on `init`. Each entry maps a templateId (looked up in
# templates.ts) to a destination path. Paths may use {core} for interpolation.
templates:
  - { path: "README.md", templateId: "root.readme" }
  - { path: ".gitignore", templateId: "root.gitignore" }
  - { path: ".framework/README.md", templateId: "framework.readme" }
  - { path: ".framework/VERSION", templateId: "framework.version" }
  - { path: ".framework/config.yaml", templateId: "framework.config" }
  - { path: ".framework/migrations/README.md", templateId: "framework.migrations.readme" }
  - { path: ".framework/events/.gitkeep", templateId: "framework.events.gitkeep" }
  - { path: ".framework/backups/.gitkeep", templateId: "framework.backups.gitkeep" }
  - { path: "references/README.md", templateId: "references.readme" }
  - { path: "references/intake/README.md", templateId: "references.intake.readme" }
  - { path: "references/frozen/README.md", templateId: "references.frozen.readme" }
  - { path: "analyses/README.md", templateId: "analyses.readme" }
  - { path: "analyses/references/.gitkeep", templateId: "analyses.references.gitkeep" }
  - { path: "analyses/gaps/.gitkeep", templateId: "analyses.gaps.gitkeep" }
  - { path: "analyses/patterns/.gitkeep", templateId: "analyses.patterns.gitkeep" }
  - { path: "analyses/templates/reference-analysis-card.md", templateId: "analysis.template.reference" }
  - { path: "analyses/templates/gap-analysis.md", templateId: "analysis.template.gap" }
  - { path: "analyses/templates/pattern-card.md", templateId: "analysis.template.pattern" }
  - { path: "systems/README.md", templateId: "systems.readme" }
  - { path: "systems/{core}/system.yaml", templateId: "system.core.contract" }
  - { path: "iterations/README.md", templateId: "iterations.readme" }
  - { path: "iterations/templates/iteration-plan.md", templateId: "iterations.template.plan" }
  - { path: "knowledge/README.md", templateId: "knowledge.readme" }
  - { path: "knowledge/decisions/README.md", templateId: "knowledge.decisions.readme" }
  - { path: "knowledge/decisions/ADR-TEMPLATE.md", templateId: "knowledge.decisions.adr_template" }
  - { path: "knowledge/guides/README.md", templateId: "knowledge.guides.readme" }
  - { path: "knowledge/patterns/README.md", templateId: "knowledge.patterns.readme" }
  - { path: "knowledge/troubleshooting/README.md", templateId: "knowledge.troubleshooting.readme" }
  - { path: "data/README.md", templateId: "data.readme" }
  - { path: "releases/README.md", templateId: "releases.readme" }
