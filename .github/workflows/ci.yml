name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "release/**"

permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release checks (Linux)
        if: runner.os != 'Windows'
        run: bash ./scripts/check.sh

      - name: Run release checks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\check.ps1
